# Netlify-Deployment des Sanierungsportals.
# Das Portal liegt im Repo-Unterordner portal/. Damit Netlify hier baut:
#   Netlify-UI → Site configuration → Build & deploy → Base directory = "portal"
# (Diese Datei liegt bewusst in portal/ und OHNE "base", damit der lokale
#  `npm run dev` nicht bricht.)
#
# Der Astro-Netlify-Adapter erzeugt Functions automatisch (u.a. /api/checklist/save).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Secret-Scanner: Ausnahmen für NICHT-geheime Variablen, deren Werte sonst
  # überall im Build vorkommen (z.B. "main" als package.json-Feld / class="main",
  # "besitzer" als Rollen-Slug, die Domain in Canonical-Links). Die echten
  # Geheimnisse (GITHUB_TOKEN, PORTAL_PASSWORD, PORTAL_WRITE_KEY, PORTAL_USERS)
  # bleiben weiter im Scan – sie landen nur zur Laufzeit in den Functions, nie im HTML.
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_BRANCH,GITHUB_REPO,SITE_URL,PORTAL_USER"
  # Netlify-eigene Build-Plugins und Abhängigkeiten nicht scannen (Fehlalarme).
  SECRETS_SCAN_OMIT_PATHS = ".netlify/**,node_modules/**"

# Environment-Variablen (Netlify-UI bzw. lokal in .env – siehe .env.example):
#   Zugangsschutz (Edge Function netlify/edge-functions/auth.ts, Basic-Auth):
#   PORTAL_USER      = <Benutzer>
#   PORTAL_PASSWORD  = <Passwort>
#   PORTAL_USERS     = user:pass,user2:pass2       (optional, mehrere Logins)
#   Checkliste speichern:
#   PORTAL_WRITE_KEY = <Schlüssel>                 (Pflicht, sonst 500 in Produktion)
#   GITHUB_TOKEN     = <Fine-grained PAT, Contents: Read+Write>
#   GITHUB_REPO      = <owner/repo>
#   GITHUB_BRANCH    = main                        (optional, Default main)
#   SITE_URL         = https://<deine-domain>      (optional)
